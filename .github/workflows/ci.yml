name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Build
      run: make build

    - name: Test (Unit)
      run: go test -v ./...

    - name: Test (Integration)
      env:
        PLANE_API_KEY: ${{ secrets.PLANE_API_KEY }}
        PLANE_WORKSPACE: ${{ secrets.PLANE_WORKSPACE }}
        PLANE_API_HOST: ${{ secrets.PLANE_API_HOST }}
      run: go test -v -tags=integration ./...

    - name: Vet
      run: go vet ./...

    - name: Format check
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "Please run 'go fmt ./...' to format your code"
          gofmt -s -l .
          exit 1
        fi

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: true

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: latest
        args: --timeout=5m
